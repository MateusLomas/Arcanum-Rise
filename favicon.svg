<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#050509"/>
  
  <!-- Outer glow circle -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#6c63ff" stroke-width="1" opacity="0.6"/>
  
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="28" fill="#141428" stroke="#6c63ff" stroke-width="2"/>
  
  <!-- Letter A (Arcanum) -->
  <text x="32" y="42" font-size="36" font-weight="bold" font-family="Arial, sans-serif" 
        text-anchor="middle" fill="#6c63ff" dominant-baseline="middle">A</text>
  
  <!-- Decorative crystal effect -->
  <polygon points="32,14 38,24 26,24" fill="none" stroke="#6c63ff" stroke-width="1.5" opacity="0.8"/>
</svg>